# Create a segment
mutation CreateSegment($name: String!, $query: String!) {
  segmentCreate(name: $name, query: $query) {
    segment {
      id
      name
      query
    }
    userErrors {
      field
      message
    }
  }
}

# List existing segments
query ListSegments($first: Int!) {
  segments(first: $first) {
    edges {
      node {
        id
        name
        default
        query
      }
    }
  }
}

# Fetch a single segment
query GetSegment($id: ID!) {
  segment(id: $id) {
    id
    name
    query
  }
}

# Preview customers in a segment query before saving it
query PreviewSegmentMembers($query: String!, $first: Int!) {
  customerSegmentMembers(query: $query, first: $first) {
    edges {
      node {
        id
        firstName
        lastName
        emailAddress {
          emailAddress
        }
      }
    }
  }
}

